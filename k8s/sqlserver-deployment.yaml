apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqlserver
  namespace: tis-app
  labels:
    app: sqlserver
    managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqlserver
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sqlserver
    spec:
      securityContext:
        fsGroup: 10001
      
      containers:
      - name: sqlserver
        image: mcr.microsoft.com/mssql/server:2022-latest
        imagePullPolicy: IfNotPresent
        
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: sqlserver-secret
              key: SA_PASSWORD
        - name: MSSQL_PID
          value: "Developer"
        - name: MSSQL_TCP_PORT
          value: "1433"
        
        ports:
        - name: mssql
          containerPort: 1433
          protocol: TCP
        
        volumeMounts:
        - name: sqlserver-data
          mountPath: /var/opt/mssql
        
        # ✅ TCP Socket Probes (pas de health endpoint requis)
        readinessProbe:
          tcpSocket:
            port: mssql
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1
        
        livenessProbe:
          tcpSocket:
            port: mssql
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      
      volumes:
      - name: sqlserver-data
        persistentVolumeClaim:
          claimName: sqlserver-pvc